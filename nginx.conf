server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets – long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

# ─── API proxy za BANK SERVICE (port 8083) ───
    location /api/bank/ {
        # Prosleđuje zahteve na port 8083 i skida /api/ deo (postaje /bank/...)
        proxy_pass          http://host.docker.internal:8083/bank/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # ─── API proxy za KREDITI / v1 rute (Bank Service, port 8083) ───
    # Mora biti IZNAD generičkog /api/ bloka da bi imalo prioritet.
    # Putanja se prosleđuje netaknuta: /api/v1/... → 8083/api/v1/...
    location /api/v1/ {
        proxy_pass          http://host.docker.internal:8083/api/v1/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # ─── API proxy za USER SERVICE (port 8082) ───
    # host.docker.internal resolves to the Docker host on Mac/Windows.
    # On Linux it is injected via extra_hosts in docker-compose.yml.
    location /api/ {
        proxy_pass          http://host.docker.internal:8082/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # SPA fallback – all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
