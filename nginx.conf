server {
    listen 80;
    server_name _;

    # Duži timeout za sporije odgovore bank/user servisa (trading, liste)
    proxy_connect_timeout 15s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets – long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

# ─── API proxy za BANK SERVICE ───
    # Actuary rute nemaju /bank/ prefiks u gRPC-gateway HTTP anotacijama.
    # Frontend šalje /api/actuary/* (ne /api/bank/actuary/*).
    location /api/actuary/ {
        proxy_pass          http://bank-service:8080/actuary/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }
    # Zadržano za kompatibilnost sa starijim putanjama
    location /api/bank/actuary/ {
        proxy_pass          http://bank-service:8080/actuary/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # Sve ostale bank-service rute imaju /bank/ prefiks u gRPC-gateway anotacijama
    # /api/bank/X  →  bank-service:8080/bank/X  (skida samo /api/ prefiks)
    location /api/bank/ {
        proxy_pass          http://bank-service:8080/bank/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # ─── API proxy za KREDITI / v1 rute (Bank Service) ───
    # Mora biti IZNAD generičkog /api/ bloka da bi imalo prioritet.
    # /api/v1/X  →  bank-service:8080/api/v1/X (putanja ostaje netaknuta)
    location /api/v1/ {
        proxy_pass          http://bank-service:8080/api/v1/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # ─── API proxy za USER SERVICE ───
    # /api/X  →  user-service:8080/X  (skida /api/ prefiks)
    location /api/ {
        proxy_pass          http://user-service:8080/;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # SPA fallback – all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
